name: K6 Load Test with Allure Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
  push:
    branches: [main]

permissions:
  contents: write   # needed to push the gh-pages branch

jobs:
  performance-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          curl -s https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install project dependencies
        run: npm install

      - name: Install Allure command line (no Docker)
        run: npm install -g allure-commandline --save-dev

      - name: Create reports/allure-results directories
        run: mkdir -p reports allure-results

      - name: Verify test file exists (debug)
        run: |
          echo "Looking for the load test file under src/ ..."
          find src -iname "*.js" | grep -i load || echo "No file matching *load* found under src/"
          echo "--- Full src/ tree ---"
          ls -R src

      - name: Run k6 test (JSON output)
        run: K6_ENV=qa k6 run --out json=reports/k6-output.json src/tests/smoke/smokeTest.js

      - name: Convert k6 JSON output to Allure results
        run: node scripts/k6-to-allure.js reports/k6-output.json allure-results

      - name: Add environment info to Allure report
        run: |
          cat <<EOF > allure-results/environment.properties
          Environment=QA
          Test_Type=Smoke
          Triggered_By=${{ github.actor }}
          Branch=${{ github.ref_name }}
          Run_ID=${{ github.run_id }}
          EOF

      - name: Fetch previous Allure history (if gh-pages exists)
        run: |
          git fetch origin gh-pages 2>/dev/null && \
          git worktree add /tmp/gh-pages origin/gh-pages 2>/dev/null || \
          echo "No gh-pages branch yet — starting fresh history."

      - name: Copy history into current results
        run: |
          if [ -d "/tmp/gh-pages/history" ]; then
            cp -r /tmp/gh-pages/history allure-results/history
          fi

      - name: Generate Allure HTML report (CLI, no Docker)
        run: allure generate allure-results --clean -o allure-report

      - name: Deploy report to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        if: always()
        with:
          branch: gh-pages
          folder: allure-report
          clean: true

      - name: Upload raw Allure results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 14

      - name: Fail the job if any k6 check failed
        run: |
          if grep -l '"status": "failed"' allure-results/*-result.json 2>/dev/null; then
            echo "One or more k6 checks failed."
            exit 1
          fi